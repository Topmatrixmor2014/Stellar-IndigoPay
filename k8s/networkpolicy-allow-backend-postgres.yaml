# k8s/networkpolicy-allow-backend-postgres.yaml
#
# Open Postgres traffic from the backend pods to the postgres StatefulSet
# on port 5432. Also opens DNS (kube-dns) so service name lookups work
# — without this the backend cannot resolve `postgres-svc.stellar-indigopay.svc`
# and connection attempts hang until timeout.
#
# Postgres is internal-only; nothing outside the backend pods should ever
# reach it, so we don't add any ingress rule here.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres
  namespace: stellar-indigopay
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Egress
  egress:
    # DNS — kube-dns listens on UDP 53 in the kube-system namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres on the headless service.
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
