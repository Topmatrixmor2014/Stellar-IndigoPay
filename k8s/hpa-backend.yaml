# k8s/hpa-backend.yaml
#
# HorizontalPodAutoscaler for the backend Deployment. Replaces the
# static `replicas: 2` in backend.yaml — the controller will scale up
# to the max replicas on CPU/memory pressure, and back down to the
# min replicas after a stabilization window.
#
# Requires metrics-server (or k8s-prometheus-adapter if using custom
# metrics). Install via:
#   helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
#   helm install metrics-server metrics-server/metrics-server --namespace kube-system
#
# Scaling is conservative by default: targets 70% CPU and 80% memory
# to avoid thrashing. Bump targets if profiling shows headroom.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: stellar-indigopay
  labels:
    app: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
