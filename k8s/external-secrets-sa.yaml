# k8s/external-secrets-sa.yaml
#
# ServiceAccount used by the external-secrets-operator to read
# secrets from AWS Secrets Manager. Required by k8s/external-secret.yaml
# via `serviceAccountRef.name`. Bind to an IAM role via IRSA (EKS) or
# Workload Identity (GKE) — see docs/external-secrets.md.
#
# Example IRSA annotation for AWS:
#   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/external-secrets-role
#
# The role must allow:
#   secretsmanager:GetSecretValue
#   secretsmanager:DescribeSecret
# on:
#    arn:aws:secretsmanager:us-east-1:123456789012:secret:stellar-indigopay/*

apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: stellar-indigopay
  annotations:
    # Replace with the IAM role ARN for your account + region.
    # Omit this annotation if using a non-AWS provider.
    eks.amazonaws.com/role-arn: arn:aws:iam::REPLACE_WITH_ACCOUNT_ID:role/external-secrets-role
