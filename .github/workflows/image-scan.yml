# .github/workflows/image-scan.yml
#
# Trivy image scan for backend and frontend Docker images. Runs after
# the CI build (or directly on main pushes). Reports CRITICAL and HIGH
# vulnerabilities but does not fail the build, so CI stays green while
# security findings are still visible in the GitHub Security tab.

name: Image Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        service: [backend, frontend]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t indigopay-${{ matrix.service }}:scan \
            ./${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: indigopay-${{ matrix.service }}:scan
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
